---
driver:
  name: vagrant
  customize:
    memory: 4096

platforms:
  - name: almalinux-9
  - name: debian-12
  - name: rockylinux-9
  - name: ubuntu-24.04

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once

verifier:
  name: inspec

suites:
  - name: default
    provisioner:
      named_run_list: default
    run_list:
      - recipe[test::default]

  - name: standalone
    provisioner:
      named_run_list: standalone
    run_list:
      - recipe[test::standalone]
